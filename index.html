<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voyeza — Travel Social</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #0D7377;
            color: #FFF;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 24px;
        }
        .logo {
            width: 88px;
            height: 88px;
            border-radius: 22px;
            margin-bottom: 28px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 52px;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 14px;
        }
        p {
            font-size: 18px;
            color: rgba(255,255,255,0.7);
            font-weight: 300;
            margin-bottom: 48px;
            line-height: 1.6;
            max-width: 380px;
        }
        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 100px;
            padding: 10px 28px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 60px;
        }
        footer {
            position: fixed;
            bottom: 24px;
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }
        footer a {
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 13px;
            transition: color 0.2s;
        }
        footer a:hover { color: #FFF; }
        @media (max-width: 400px) { h1 { font-size: 38px; } }
    </style>
</head>
<body>
    <img src="icon.png" alt="Voyeza" class="logo">
    <h1>Voyeza</h1>
    
    <div class="badge">Coming soon</div>
    <footer>
        <a href="/privacy.html">Privacy Policy</a>
        <a href="/terms.html">Terms of Service</a>
        <a href="/support.html">Support</a>
    </footer>
</body>
</html>
